<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212">
    <meta name="description" content="A minimalist Orbit Pomodoro Timer PWA">
    <title>Orbit Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="container">
        <div class="settings">
            <input type="number" id="timer-input" class="timer-input" placeholder="Minutes" min="1" max="60" value="25">
            <span class="label">MIN</span>
        </div>
        <div class="timer-container">
            <svg class="orbit-svg" viewBox="0 0 100 100">
                <circle class="orbit-bg" cx="50" cy="50" r="45"></circle>
                <circle class="orbit-progress" cx="50" cy="50" r="45"></circle>
            </svg>
            <div class="timer-display">
                <span id="minutes">25</span>:<span id="seconds">00</span>
            </div>
        </div>
        <div class="controls">
            <button id="start-pause" class="btn">Start</button>
            <button id="pause" class="btn" style="display:none;">Pause</button>
            <button id="reset" class="btn">Reset</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
